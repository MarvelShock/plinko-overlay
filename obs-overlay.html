<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plinko OBS Overlay</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 560px;
    overflow: hidden;
    background: transparent;
    font-family: 'DM Mono', monospace;
  }

  .wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 10px 10px 0;
    width: 560px;
    background: transparent;
  }

  .title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2.4rem;
    letter-spacing: 0.1em;
    color: #ff2d9b;
    text-shadow: 0 0 24px rgba(255,45,155,0.7), 0 2px 8px rgba(0,0,0,0.6);
    margin-bottom: 6px;
    align-self: flex-start;
    white-space: nowrap;
  }

  canvas {
    display: block;
    border-radius: 10px;
  }

  /* Big result overlay that shows when a ball lands */
  .result-pop {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0.6);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 3.2rem;
    letter-spacing: 0.08em;
    color: #fff700;
    text-shadow: 0 0 32px #ff2d9b, 0 0 8px rgba(0,0,0,1);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s, transform 0.25s cubic-bezier(0.34,1.56,0.64,1);
    text-align: center;
    white-space: nowrap;
    z-index: 10;
  }
  .result-pop.show {
    opacity: 1;
    transform: translate(-50%, -50%) scale(1);
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="title">THENICOLET LOSER PLINKO</div>
  <canvas id="plinko" width="520" height="480"></canvas>
</div>
<div class="result-pop" id="resultPop"></div>

<script>
const TWITCH_CHANNEL = 'thenicolet';
const TWITCH_TRIGGER = '!drop';
const ALLOWED_USERS  = ['tyler25', 'thenicolet'];

const SLOT_PALETTE = ['#f472b6','#e879a0','#c084fc','#818cf8','#60a5fa','#a78bfa','#f9a8d4','#7dd3fc','#e879f9'];
const slots = [
  { label: '5 SUBS',  color: '#60a5fa' },
  { label: '7 SUBS',  color: '#818cf8' },
  { label: '10 SUBS', color: '#c084fc' },
  { label: '15 SUBS', color: '#f472b6' },
  { label: '20 SUBS', color: '#e879a0' },
  { label: '25 SUBS', color: '#a78bfa' },
  { label: '10 SUBS', color: '#7dd3fc' },
  { label: '5 SUBS',  color: '#60a5fa' },
];

const canvas = document.getElementById('plinko');
const ctx    = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;
const ROWS = 10, PEG_R = 5, BALL_R = 10, PAD_TOP = 36, PAD_SIDE = 40;

function getPegGrid() {
  const pegs = [];
  for (let r = 0; r < ROWS; r++) {
    const cols = r + 3;
    const spacing = (W - PAD_SIDE * 2) / (cols - 1);
    const y = PAD_TOP + r * ((H - PAD_TOP - 28) / (ROWS - 1));
    for (let c = 0; c < cols; c++) pegs.push({ x: PAD_SIDE + c * spacing, y, row: r, col: c });
  }
  return pegs;
}
const pegs = getPegGrid();
let balls = [], litPegs = new Set();

function spawnBall() {
  balls.push({ x: W/2 + (Math.random()-0.5)*8, y: 10, vx: (Math.random()-0.5)*0.4, vy: 0.5, trail: [], done: false });
}

function stepBall(ball) {
  if (ball.done) return;
  ball.trail.unshift({ x: ball.x, y: ball.y });
  if (ball.trail.length > 14) ball.trail.pop();
  ball.vy += 0.045; ball.vx *= 0.989;
  ball.x += ball.vx; ball.y += ball.vy;
  if (ball.x - BALL_R < 0)  { ball.x = BALL_R;     ball.vx =  Math.abs(ball.vx); }
  if (ball.x + BALL_R > W)  { ball.x = W - BALL_R; ball.vx = -Math.abs(ball.vx); }
  for (const peg of pegs) {
    const dx = ball.x - peg.x, dy = ball.y - peg.y;
    const dist = Math.sqrt(dx*dx + dy*dy);
    if (dist < BALL_R + PEG_R + 1) {
      const nx = dx/dist, ny = dy/dist;
      const ov = BALL_R + PEG_R + 1 - dist;
      ball.x += nx*ov; ball.y += ny*ov;
      const dot = ball.vx*nx + ball.vy*ny;
      ball.vx -= 2*dot*nx; ball.vy -= 2*dot*ny;
      ball.vx += (Math.random()-0.5)*0.4;
      ball.vy *= 0.55;
      const key = `${peg.row}-${peg.col}`;
      litPegs.add(key); setTimeout(() => litPegs.delete(key), 180);
    }
  }
  if (ball.y + BALL_R >= H - 2) {
    ball.done = true; ball.y = H - BALL_R - 2;
    const n = slots.length;
    const slotW = (W - PAD_SIDE*2) / n;
    const idx = Math.max(0, Math.min(n-1, Math.floor((ball.x - PAD_SIDE) / slotW)));
    showResultPop(idx);
  }
}

const resultPop = document.getElementById('resultPop');
let resultTimeout = null;
function showResultPop(idx) {
  const slot = slots[idx];
  resultPop.textContent = slot ? slot.label : '';
  resultPop.style.color = slot ? slot.color : '#fff700';
  resultPop.style.textShadow = `0 0 32px ${slot ? slot.color : '#ff2d9b'}, 0 0 8px rgba(0,0,0,1)`;
  resultPop.classList.add('show');
  clearTimeout(resultTimeout);
  resultTimeout = setTimeout(() => resultPop.classList.remove('show'), 3000);
}

function drawBoard() {
  ctx.clearRect(0, 0, W, H);
  // Dark bg with grid dots
  const bg = ctx.createLinearGradient(0, 0, W*0.6, H);
  bg.addColorStop(0, 'rgba(28,6,58,0.96)'); bg.addColorStop(1, 'rgba(6,4,28,0.99)');
  ctx.fillStyle = bg; ctx.fillRect(0, 0, W, H);
  ctx.fillStyle = 'rgba(167,139,250,0.055)';
  const gs = 22;
  for (let gx = gs; gx < W; gx += gs) for (let gy = gs; gy < H; gy += gs) { ctx.beginPath(); ctx.arc(gx, gy, 0.8, 0, Math.PI*2); ctx.fill(); }
  const glow = ctx.createRadialGradient(W/2, 0, 0, W/2, 0, W*0.7);
  glow.addColorStop(0, 'rgba(244,114,182,0.09)'); glow.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = glow; ctx.fillRect(0, 0, W, H);

  for (const peg of pegs) {
    const lit = litPegs.has(`${peg.row}-${peg.col}`);
    ctx.beginPath(); ctx.arc(peg.x, peg.y, PEG_R, 0, Math.PI*2);
    ctx.fillStyle  = lit ? '#f472b6' : 'rgba(167,139,250,0.55)';
    ctx.shadowColor = lit ? '#f472b6' : 'transparent';
    ctx.shadowBlur  = lit ? 14 : 0;
    ctx.fill(); ctx.shadowBlur = 0;
  }

  for (const ball of balls) {
    for (let i = 0; i < ball.trail.length; i++) {
      const t = ball.trail[i];
      ctx.beginPath(); ctx.arc(t.x, t.y, BALL_R*(1-i/ball.trail.length*0.5), 0, Math.PI*2);
      ctx.fillStyle = `rgba(244,114,182,${(1-i/ball.trail.length)*0.22})`; ctx.fill();
    }
    const grad = ctx.createRadialGradient(ball.x-3, ball.y-3, 1, ball.x, ball.y, BALL_R);
    grad.addColorStop(0, '#fff0f8'); grad.addColorStop(0.5, '#f472b6'); grad.addColorStop(1, '#be185d');
    ctx.beginPath(); ctx.arc(ball.x, ball.y, BALL_R, 0, Math.PI*2);
    ctx.fillStyle = grad; ctx.shadowColor = 'rgba(244,114,182,0.85)'; ctx.shadowBlur = 16;
    ctx.fill(); ctx.shadowBlur = 0;
  }
}

function loop() {
  balls = balls.filter(b => !(b.done && b.trail.length === 0));
  for (const b of balls) { stepBall(b); if (b.done) b.trail.pop(); }
  drawBoard();
  requestAnimationFrame(loop);
}
loop();

// Twitch IRC
let twitchWS = null, twitchPing = null, dropCooldown = false;
function twitchConnect() {
  if (twitchWS && twitchWS.readyState < 2) return;
  twitchWS = new WebSocket('wss://irc-ws.chat.twitch.tv:443');
  twitchWS.onopen = () => {
    twitchWS.send('CAP REQ :twitch.tv/tags twitch.tv/commands');
    twitchWS.send('PASS SCHMOOPIIE');
    twitchWS.send('NICK justinfan' + Math.floor(Math.random() * 99999));
    twitchWS.send('JOIN #' + TWITCH_CHANNEL);
    twitchPing = setInterval(() => { if (twitchWS && twitchWS.readyState === 1) twitchWS.send('PING :tmi.twitch.tv'); }, 4 * 60 * 1000);
  };
  twitchWS.onmessage = e => {
    const raw = e.data;
    if (raw.includes('PING')) { twitchWS.send('PONG :tmi.twitch.tv'); return; }
    const privMatch = raw.match(/PRIVMSG #\S+ :(.+)/);
    if (!privMatch) return;
    const msg = privMatch[1].trim().toLowerCase();
    const userMatch = raw.match(/display-name=([^;]+)/);
    const user = userMatch ? userMatch[1].trim() : '';
    if (!ALLOWED_USERS.includes(user.toLowerCase())) return;
    if (msg === TWITCH_TRIGGER || msg.startsWith(TWITCH_TRIGGER + ' ')) {
      if (dropCooldown) return;
      dropCooldown = true; spawnBall();
      setTimeout(() => { dropCooldown = false; }, 3500);
    }
  };
  twitchWS.onclose = () => { clearInterval(twitchPing); setTimeout(twitchConnect, 8000); };
  twitchWS.onerror = () => {};
}
twitchConnect();
</script>
</body>
</html>
